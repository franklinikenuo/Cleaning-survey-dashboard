<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Cleaning Survey</title>

  <style>
    :root {
      --bg: #f4f6f8;
      --card-bg: #ffffff;
      --border: #dde2e7;
      --primary: #0b6efd;
      --text-main: #1f2933;
      --text-muted: #6b7280;
      --yes: #d1fae5;
      --no: #fee2e2;
      --na: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      margin: 0;
      padding: 16px;
      color: var(--text-main);
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    .card {
      background: var(--card-bg);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }

    h1 {
      font-size: 1.25rem;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .icon {
      width: 18px;
      height: 18px;
      opacity: 0.75;
    }

    select, textarea {
      width: 100%;
      padding: 9px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #f9fafb;
      font-size: 0.9rem;
      transition: background 0.2s ease;
    }

    select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: #ffffff;
      box-shadow: 0 0 0 1px rgba(11, 110, 253, 0.08);
    }

    .task-row {
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      transition: background 0.25s ease;
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: relative;
    }

    .checkmark {
      position: absolute;
      right: 10px;
      top: 10px;
      width: 22px;
      opacity: 0;
      transform: scale(0.6);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .task-row.checked .checkmark {
      opacity: 1;
      transform: scale(1);
    }

    button {
      margin-top: 16px;
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }

    button:active { transform: translateY(1px); }

    #successScreen {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }

    #successScreen img {
      width: 80px;
      margin-bottom: 20px;
    }

    #successScreen h2 {
      font-size: 1.3rem;
      margin-bottom: 10px;
    }

    #successScreen p {
      color: var(--text-muted);
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- SUCCESS SCREEN -->
    <div id="successScreen">
      <img src="https://img.icons8.com/color/96/checked--v1.png" alt="Success">
      <h2>Submission Complete</h2>
      <p>Your cleaning record has been saved.</p>
    </div>

    <!-- FORM CARD -->
    <div class="card" id="formCard">
      <h1>Daily Cleaning Survey</h1>
      <div class="subtitle">Complete once per room per shift.</div>

      <form id="surveyForm">

        <!-- ROOM -->
        <label for="room">Room</label>
        <select id="room" required>
          <option value="">Select room</option>
          <option>Andrology Lab</option>
          <option>Recovery Room</option>
          <option>Procedure Room</option>
          <option>Ultrasound Room 1</option>
          <option>Ultrasound Room 2</option>
          <option>Ultrasound Room 3</option>
          <option>Ultrasound Room 4</option>
          <option>Ultrasound Room 5</option>
          <option>Collection Room 1</option>
          <option>Collection Room 2</option>
          <option>Blood Lab</option>
        </select>

        <!-- STAFF -->
        <label for="staff">Staff</label>
        <select id="staff" required>
          <option value="">Select staff</option>
          <option>Hanna</option>
          <option>Hamse</option>
          <option>Tania</option>
          <option>Team Shift (Hanna, Hamse, Tania)</option>
          <option>Mohubo</option>
        </select>

        <!-- SHIFT -->
        <label for="shift">Shift</label>
        <select id="shift" required>
          <option value="">Select shift</option>
          <option>Day</option>
          <option>Evening</option>
          <option>Night</option>
        </select>

        <hr style="border: none; border-top: 1px solid var(--border); margin: 18px 0;">

        <h3 style="margin-bottom: 10px;">Tasks Completed</h3>

        <!-- TASK ROWS -->
        <div class="task-row" id="row-trash">
          <label for="trash">
            <img class="icon" src="https://img.icons8.com/ios/50/trash.png" alt="">
            Trash
          </label>
          <select id="trash" onchange="updateTaskColor('trash')">
            <option value="">Y / N / NA</option>
            <option>Y</option>
            <option>N</option>
            <option>NA</option>
          </select>
          <img class="checkmark" src="https://img.icons8.com/color/48/checked--v1.png" alt="">
        </div>

        <div class="task-row" id="row-mop">
          <label for="mop">
            <img class="icon" src="https://img.icons8.com/ios/50/mop.png" alt="">
            Mop
          </label>
          <select id="mop" onchange="updateTaskColor('mop')">
            <option value="">Y / N / NA</option>
            <option>Y</option>
            <option>N</option>
            <option>NA</option>
          </select>
          <img class="checkmark" src="https://img.icons8.com/color/48/checked--v1.png" alt="">
        </div>

        <div class="task-row" id="row-sanitize">
          <label for="sanitize">
            <img class="icon" src="https://img.icons8.com/ios/50/spray-bottle.png" alt="">
            Sanitize
          </label>
          <select id="sanitize" onchange="updateTaskColor('sanitize')">
            <option value="">Y / N / NA</option>
            <option>Y</option>
            <option>N</option>
            <option>NA</option>
          </select>
          <img class="checkmark" src="https://img.icons8.com/color/48/checked--v1.png" alt="">
        </div>

        <div class="task-row" id="row-sweep">
          <label for="sweep">
            <img class="icon" src="https://img.icons8.com/ios/50/broom.png" alt="">
            Sweep
          </label>
          <select id="sweep" onchange="updateTaskColor('sweep')">
            <option value="">Y / N / NA</option>
            <option>Y</option>
            <option>N</option>
            <option>NA</option>
          </select>
          <img class="checkmark" src="https://img.icons8.com/color/48/checked--v1.png" alt="">
        </div>

        <div class="task-row" id="row-linen">
          <label for="linen">
            <img class="icon" src="https://img.icons8.com/ios/50/towel.png" alt="">
            Linen Change
          </label>
          <select id="linen" onchange="updateTaskColor('linen')">
            <option value="">Y / N / NA</option>
            <option>Y</option>
            <option>N</option>
            <option>NA</option>
          </select>
          <img class="checkmark" src="https://img.icons8.com/color/48/checked--v1.png" alt="">
        </div>

        <div class="task-row" id="row-vacuum">
          <label for="vacuum">
            <img class="icon" src="https://img.icons8.com/ios/50/vacuum-cleaner.png" alt="">
            Vacuum
          </label>
          <select id="vacuum" onchange="updateTaskColor('vacuum')">
            <option value="">Y / N / NA</option>
            <option>Y</option>
            <option>N</option>
            <option>NA</option>
          </select>
          <img class="checkmark" src="https://img.icons8.com/color/48/checked--v1.png" alt="">
        </div>

        <!-- NOTES -->
        <label for="notes">Notes (optional)</label>
        <textarea id="notes" placeholder="Enter any comments..."></textarea>

        <button type="submit">Submit Survey</button>
      </form>
    </div>
  </div>

  <script>
    function updateTaskColor(task) {
      const value = document.getElementById(task).value;
      const row = document.getElementById("row-" + task);

      row.classList.remove("checked");
      row.style.background = "";

      if (value === "Y") row.style.background = "var(--yes)";
      if (value === "N") row.style.background = "var(--no)";
      if (value === "NA") row.style.background = "var(--na)";

      if (value) row.classList.add("checked");
    }

    document.getElementById("surveyForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const data = {
        room: room.value,
        staff_name: staff.value,
        shift: shift.value,
        tasks_completed: {
          trash: trash.value,
          mop: mop.value,
          sanitize: sanitize.value,
          sweep: sweep.value,
          linen: linen.value,
          vacuum: vacuum.value
        },
        notes: notes.value
      };

      const response = await fetch("https://cleaning-survey-api.onrender.com/submit", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      if (response.ok) {
        document.getElementById("formCard").style.display = "none";
        document.getElementById("successScreen").style.display = "block";
      }
    });
  </script>
</body>
</html>
