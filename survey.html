<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Cleaning Survey</title>

  <style>
    :root {
      --bg: #f4f6f8;
      --card-bg: #ffffff;
      --border: #dde2e7;
      --primary: #0b6efd;
      --text-main: #1f2933;
      --text-muted: #6b7280;
    }

    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      margin: 0;
      padding: 16px;
      color: var(--text-main);
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    .card {
      background: var(--card-bg);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }

    h1 {
      font-size: 1.25rem;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .icon {
      width: 18px;
      height: 18px;
      opacity: 0.75;
    }

    select, textarea {
      width: 100%;
      padding: 9px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #f9fafb;
      font-size: 0.9rem;
    }

    button {
      margin-top: 16px;
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
    }

    #status {
      margin-top: 10px;
      font-size: 0.85rem;
    }

    #status.ok { color: #15803d; }
    #status.error { color: #b91c1c; }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>Daily Cleaning Survey</h1>
      <div class="subtitle">Complete once per room per shift.</div>

      <form id="surveyForm">

        <!-- ROOM -->
        <label>Room</label>
        <select id="room" required>
          <option value="">Select room</option>
          <option>Andrology Lab</option>
          <option>Recovery Room</option>
          <option>Procedure Room</option>
          <option>Ultrasound Room 1</option>
          <option>Ultrasound Room 2</option>
          <option>Ultrasound Room 3</option>
          <option>Ultrasound Room 4</option>
          <option>Ultrasound Room 5</option>
          <option>Collection Room 1</option>
          <option>Collection Room 2</option>
          <option>Blood Lab</option>
        </select>

        <!-- STAFF -->
        <label>Staff</label>
        <select id="staff" required>
          <option value="">Select staff</option>
          <option>Hanna</option>
          <option>Hamse</option>
          <option>Tania</option>
          <option>Team Shift (Hanna, Hamse, Tania)</option>
          <option>Mohubo</option>
        </select>

        <!-- SHIFT -->
        <label>Shift</label>
        <select id="shift" required>
          <option value="">Select shift</option>
          <option>Day</option>
          <option>Evening</option>
          <option>Night</option>
        </select>

        <hr style="border: none; border-top: 1px solid var(--border); margin: 18px 0;">

        <h3 style="margin-bottom: 10px;">Tasks Completed</h3>

        <!-- TASKS WITH ICONS -->
        <label><img class="icon" src="https://img.icons8.com/ios/50/trash.png"> Trash</label>
        <select id="trash" required>
          <option value="">Y / N / NA</option><option>Y</option><option>N</option><option>NA</option>
        </select>

        <label><img class="icon" src="https://img.icons8.com/ios/50/mop.png"> Mop</label>
        <select id="mop" required>
          <option value="">Y / N / NA</option><option>Y</option><option>N</option><option>NA</option>
        </select>

        <label><img class="icon" src="https://img.icons8.com/ios/50/spray-bottle.png"> Sanitize</label>
        <select id="sanitize" required>
          <option value="">Y / N / NA</option><option>Y</option><option>N</option><option>NA</option>
        </select>

        <label><img class="icon" src="https://img.icons8.com/ios/50/broom.png"> Sweep</label>
        <select id="sweep" required>
          <option value="">Y / N / NA</option><option>Y</option><option>N</option><option>NA</option>
        </select>

        <label><img class="icon" src="https://img.icons8.com/ios/50/towel.png"> Linen Change</label>
        <select id="linen" required>
          <option value="">Y / N / NA</option><option>Y</option><option>N</option><option>NA</option>
        </select>

        <label><img class="icon" src="https://img.icons8.com/ios/50/vacuum-cleaner.png"> Vacuum</label>
        <select id="vacuum" required>
          <option value="">Y / N / NA</option><option>Y</option><option>N</option><option>NA</option>
        </select>

        <!-- NOTES -->
        <label>Notes (optional)</label>
        <textarea id="notes" placeholder="Enter any comments..."></textarea>

        <button type="submit">Submit Survey</button>
        <p id="status"></p>
      </form>
    </div>
  </div>

  <script>
    document.getElementById("surveyForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const statusEl = document.getElementById("status");
      statusEl.textContent = "";
      statusEl.className = "";

      const data = {
        room: room.value,
        staff_name: staff.value,
        shift: shift.value,
        tasks_completed: {
          trash: trash.value,
          mop: mop.value,
          sanitize: sanitize.value,
          sweep: sweep.value,
          linen: linen.value,
          vacuum: vacuum.value
        },
        notes: notes.value
      };

      try {
        const response = await fetch("https://cleaning-survey-api.onrender.com/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        if (response.ok) {
          statusEl.textContent = "Submitted successfully.";
          statusEl.className = "ok";
          surveyForm.reset();
        } else {
          statusEl.textContent = "Submission failed.";
          statusEl.className = "error";
        }
      } catch {
        statusEl.textContent = "Network error.";
        statusEl.className = "error";
      }
    });
  </script>
</body>
</html>
