<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Cleaning Survey</title>

  <link rel="stylesheet" href="styles.css" />

  <style>
    /* Page-specific lightweight styling */
    body {
      background: var(--bg);
      padding: 16px;
    }

    #progressContainer {
      width: 100%;
      height: 6px;
      background: #e5e7eb;
      border-radius: 4px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    #progressBar {
      height: 100%;
      width: 0%;
      background: var(--primary);
      transition: width 0.3s ease;
    }

    .card {
      background: var(--card-bg);
      border-radius: 12px;
      border: 1px solid var(--border-soft);
      padding: 20px;
      box-shadow: var(--shadow-soft);
      animation: slideIn 0.4s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .task-row {
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      transition: background 0.25s ease;
      position: relative;
    }

    .checkmark {
      position: absolute;
      right: 10px;
      top: 10px;
      width: 22px;
      opacity: 0;
      transform: scale(0.6);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .task-row.checked .checkmark {
      opacity: 1;
      transform: scale(1);
    }

    #successScreen {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }

    #successScreen img {
      width: 80px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <h2>Daily Cleaning Survey</h2>
    <div class="nav-links">
      <a href="index.html">Dashboard</a>
      <a href="reports.html">Reports</a>
    </div>
  </nav>

  <div class="survey-container">

    <!-- PROGRESS BAR -->
    <div id="progressContainer">
      <div id="progressBar"></div>
    </div>

    <!-- SUCCESS SCREEN -->
    <div id="successScreen">
      <img src="https://img.icons8.com/color/96/checked--v1.png">
      <h2>Submission Complete</h2>
      <p>Your cleaning record has been saved.</p>
    </div>

    <!-- FORM CARD -->
    <div class="card" id="formCard">
      <h1>Daily Cleaning Survey</h1>
      <div class="subtitle">Complete once per room per shift.</div>

      <form id="surveyForm">

        <!-- ROOM -->
        <label for="room">Room</label>
        <select id="room" required onchange="updateProgress()">
          <option value="">Select Room</option>

          <!-- Labs -->
          <option value="Andrology/Embryology Lab">Andrology/Embryology Lab</option>
          <option value="Blood Lab">Blood Lab</option>

          <!-- Recovery / Procedure -->
          <option value="Recovery Room">Recovery Room</option>
          <option value="Procedure Room">Procedure Room</option>

          <!-- Ultrasound Rooms -->
          <option value="Ultrasound Room 1">Ultrasound Room 1</option>
          <option value="Ultrasound Room 2">Ultrasound Room 2</option>
          <option value="Ultrasound Room 3">Ultrasound Room 3</option>
          <option value="Ultrasound Room 4">Ultrasound Room 4</option>
          <option value="Ultrasound Room 5">Ultrasound Room 5</option>
          <option value="Ultrasound Room 6">Ultrasound Room 6</option>
          <option value="Ultrasound Room 7">Ultrasound Room 7</option>

          <!-- Collection Rooms -->
          <option value="Collection Room 1">Collection Room 1</option>
          <option value="Collection Room 2">Collection Room 2</option>
        </select>

        <!-- STAFF -->
        <label for="staff">Staff</label>
        <select id="staff" required onchange="updateProgress()">
          <option value="">Select staff</option>
          <option>Hanna</option>
          <option>Hamse</option>
          <option>Tania</option>
          <option>Team Shift (Hanna, Hamse, Tania)</option>
          <option>Mohubo</option>
        </select>

        <!-- SHIFT -->
        <label for="shift">Shift</label>
        <select id="shift" required onchange="updateProgress()">
          <option value="">Select shift</option>
          <option>Morning</option>
          <option>Afternoon</option>
          <option>Evening</option>
          <option>Night</option>
        </select>

        <hr style="border: none; border-top: 1px solid var(--border-soft); margin: 18px 0;">

        <h3 style="margin-bottom: 10px;">Tasks Completed</h3>

        <!-- TASKS -->
        <div class="task-row" id="row-trash">
          <label><img class="icon" src="https://img.icons8.com/ios/50/trash.png"> Trash</label>
          <select id="trash" onchange="updateTaskColor('trash'); updateProgress()">
            <option value="">Y / N / NA</option><option>Y</option><option>N</option><option>NA</option>
          </select>
          <img class="checkmark" src="https://img.icons8.com/color/48/checked--v1.png">
        </div>

        <div class="task-row" id="row-mop">
          <label><img class="icon" src="https://img.icons8.com/ios/50/mop.png"> Mop</label>
          <select id="mop" onchange="updateTaskColor('mop'); updateProgress()">
            <option value="">Y / N / NA</option><option>Y</option><option>N</option><option>NA</option>
          </select>
          <img class="checkmark" src="https://img.icons8.com/color/48/checked--v1.png">
        </div>

        <div class="task-row" id="row-sanitize">
          <label><img class="icon" src="https://img.icons8.com/ios/50/spray-bottle.png"> Sanitize</label>
          <select id="sanitize" onchange="updateTaskColor('sanitize'); updateProgress()">
            <option value="">Y / N / NA</option><option>Y</option><option>N</option><option>NA</option>
          </select>
          <img class="checkmark" src="https://img.icons8.com/color/48/checked--v1.png">
        </div>

        <div class="task-row" id="row-sweep">
          <label><img class="icon" src="https://img.icons8.com/ios/50/broom.png"> Sweep</label>
          <select id="sweep" onchange="updateTaskColor('sweep'); updateProgress()">
            <option value="">Y / N / NA</option><option>Y</option><option>N</option><option>NA</option>
          </select>
          <img class="checkmark" src="https://img.icons8.com/color/48/checked--v1.png">
        </div>

        <div class="task-row" id="row-linen">
          <label><img class="icon" src="https://img.icons8.com/ios/50/towel.png"> Linen Change</label>
          <select id="linen" onchange="updateTaskColor('linen'); updateProgress()">
            <option value="">Y / N / NA</option><option>Y</option><option>N</option><option>NA</option>
          </select>
          <img class="checkmark" src="https://img.icons8.com/color/48/checked--v1.png">
        </div>

        <div class="task-row" id="row-vacuum">
          <label><img class="icon" src="https://img.icons8.com/ios/50/vacuum-cleaner.png"> Vacuum</label>
          <select id="vacuum" onchange="updateTaskColor('vacuum'); updateProgress()">
            <option value="">Y / N / NA</option><option>Y</option><option>N</option><option>NA</option>
          </select>
          <img class="checkmark" src="https://img.icons8.com/color/48/checked--v1.png">
        </div>

        <!-- NOTES -->
        <label>Notes (optional)</label>
        <textarea id="notes" placeholder="Enter any comments..." onchange="updateProgress()"></textarea>

        <!-- SUBMIT -->
        <button type="submit">Submit Survey</button>

      </form>
    </div>
  </div>

  <script>
    function updateTaskColor(task) {
      const value = document.getElementById(task).value;
      const row = document.getElementById("row-" + task);

      row.classList.remove("checked");
      row.style.background = "";

      if (value === "Y") row.style.background = "var(--yes)";
      if (value === "N") row.style.background = "var(--no)";
      if (value === "NA") row.style.background = "var(--na)";
      if (value) row.classList.add("checked");
    }

    function updateProgress() {
      const fields = [
        room.value, staff.value, shift.value,
        trash.value, mop.value, sanitize.value,
        sweep.value, linen.value, vacuum.value,
        notes.value.trim()
      ];

      const filled = fields.filter(v => v !== "").length;
      const percent = Math.round((filled / fields.length) * 100);
      document.getElementById("progressBar").style.width = percent + "%";
    }

    document.getElementById("surveyForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const data = {
        room: room.value,
        staff: staff.value,
        shift: shift.value,
        tasks_completed: {
          trash: trash.value,
          mop: mop.value,
          sanitize: sanitize.value,
          sweep: sweep.value,
          linen: linen.value,
          vacuum: vacuum.value
        },
        notes: notes.value
      };

      const response = await fetch("https://cleaning-survey-api-v2-x6sf.onrender.com/submit", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      if (response.ok) {
        document.getElementById("formCard").style.display = "none";
        document.getElementById("successScreen").style.display = "block";
      }
    });
  </script>

</body>
</html>
