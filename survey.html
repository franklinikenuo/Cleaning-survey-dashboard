<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cleaning Survey</title>

  <style>
    body {
      margin: 0;
      background: #e9f1ff;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #1a2b49;
    }

    .app {
      max-width: 600px;
      margin: auto;
      padding: 24px;
    }

    .card {
      background: white;
      padding: 26px;
      border-radius: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      border: 1px solid #dce6f9;
    }

    h2 {
      margin-top: 0;
      text-align: center;
      color: #0f3d91;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    label {
      font-weight: 600;
      margin-top: 18px;
      display: block;
      color: #1a2b49;
      font-size: 15px;
    }

    input, textarea {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #c4d4f3;
      margin-top: 8px;
      font-size: 15px;
      background: #f8faff;
      transition: 0.2s;
    }

    input:focus, textarea:focus {
      border-color: #0f3d91;
      outline: none;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(15,61,145,0.15);
    }

    .shift-buttons {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }

    .shift-btn {
      flex: 1;
      padding: 14px;
      text-align: center;
      border-radius: 12px;
      border: 2px solid #c4d4f3;
      cursor: pointer;
      font-weight: 600;
      background: #f0f5ff;
      transition: 0.2s;
      color: #1a2b49;
    }

    .shift-btn.active {
      background: #0f3d91;
      color: white;
      border-color: #0f3d91;
      box-shadow: 0 4px 10px rgba(15,61,145,0.25);
    }

    .task-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 12px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #f3f7ff;
      padding: 14px;
      border-radius: 14px;
      cursor: pointer;
      border: 1px solid #d6e2fb;
      transition: 0.2s;
    }

    .task-item:hover {
      background: #e8f0ff;
    }

    .task-item input {
      transform: scale(1.4);
      accent-color: #0f3d91;
    }

    button {
      width: 100%;
      padding: 18px;
      background: #0f3d91;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 700;
      margin-top: 26px;
      cursor: pointer;
      transition: 0.2s;
      letter-spacing: 0.3px;
    }

    button:hover {
      background: #0c2f70;
      box-shadow: 0 4px 12px rgba(15,61,145,0.25);
    }

    .success {
      display: none;
      text-align: center;
      padding: 50px 20px;
    }

    .success h3 {
      color: #22c55e;
      font-size: 30px;
      font-weight: 700;
    }

    .success p {
      font-size: 17px;
      color: #1a2b49;
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="card" id="form-card">
      <h2>Cleaning Survey</h2>

      <label>Room</label>
      <input id="room" type="text" placeholder="Enter room name" required />

      <label>Staff Name</label>
      <input id="staff_name" type="text" placeholder="Enter your name" required />

      <label>Shift</label>
      <div class="shift-buttons">
        <div class="shift-btn" data-shift="Morning">Morning</div>
        <div class="shift-btn" data-shift="Evening">Evening</div>
        <div class="shift-btn" data-shift="Night">Night</div>
      </div>

      <input type="hidden" id="shift" />

      <label>Tasks Completed</label>
      <div class="task-grid">
        <label class="task-item"><input type="checkbox" id="floor_cleaned" /> Floor Cleaned</label>
        <label class="task-item"><input type="checkbox" id="trash_removed" /> Trash Removed</label>
        <label class="task-item"><input type="checkbox" id="surfaces_wiped" /> Surfaces Wiped</label>
        <label class="task-item"><input type="checkbox" id="equipment_sanitized" /> Equipment Sanitized</label>
        <label class="task-item"><input type="checkbox" id="supplies_restocked" /> Supplies Restocked</label>
        <label class="task-item"><input type="checkbox" id="sweep" /> Swept</label>
        <label class="task-item"><input type="checkbox" id="linen_change" /> Linen Change</label>
        <label class="task-item"><input type="checkbox" id="vacuum" /> Vacuum</label>
      </div>

      <label>Notes</label>
      <textarea id="notes" rows="3" placeholder="Optional notes..."></textarea>

      <button id="submitBtn">Submit Survey</button>
    </div>

    <div class="success" id="success-screen">
      <h3>✔ Survey Submitted!</h3>
      <p>Your cleaning record has been saved.</p>
    </div>

  </div>

  <script>
    /* ⭐ Correct API — LIVE backend */
    const API_BASE = "https://cleaning-survey-api.onrender.com";

    // SHIFT BUTTON HANDLER
    document.querySelectorAll(".shift-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".shift-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById("shift").value = btn.dataset.shift;
      });
    });

    // SUBMIT HANDLER
    document.getElementById("submitBtn").addEventListener("click", async () => {
      const shift = document.getElementById("shift").value;
      if (!shift) {
        alert("Please select a shift");
        return;
      }

      const payload = {
        room: document.getElementById("room").value.trim(),
        staff_name: document.getElementById("staff_name").value.trim(),
        shift,
        tasks_completed: {
          floor_cleaned: document.getElementById("floor_cleaned").checked,
          trash_removed: document.getElementById("trash_removed").checked,
          surfaces_wiped: document.getElementById("surfaces_wiped").checked,
          equipment_sanitized: document.getElementById("equipment_sanitized").checked,
          supplies_restocked: document.getElementById("supplies_restocked").checked,
          sweep: document.getElementById("sweep").checked,
          linen_change: document.getElementById("linen_change").checked,
          vacuum: document.getElementById("vacuum").checked
        },
        notes: document.getElementById("notes").value.trim()
      };

      const res = await fetch(`${API_BASE}/submit`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      if (res.ok) {
        document.getElementById("form-card").style.display = "none";
        document.getElementById("success-screen").style.display = "block";
      } else {
        alert("Error submitting survey.");
      }
    });
  </script>
</body>
</html>
