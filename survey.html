<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Cleaning Survey</title>

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="survey.css" />

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<header class="top-bar">
  <div class="top-bar-left">
    <div>
      <h1>Daily Cleaning Survey</h1>
      <p>Complete once per room per shift</p>
    </div>

    <nav class="top-nav-links">
      <a href="index.html">Dashboard</a>
      <a href="reports.html">Reports</a>
    </nav>
  </div>
</header>

<main class="survey-container">

  <form id="surveyForm">

    <!-- ROOM -->
    <div class="card">
      <label>Room</label>
      <select id="room" required>
        <option value="">Select room</option>
        <option>Andrology/Embryology Lab</option>
        <option>Blood Lab</option>
        <option>Recovery Room</option>
        <option>Procedure Room</option>
        <option>Ultrasound Room 1</option>
        <option>Ultrasound Room 2</option>
        <option>Ultrasound Room 3</option>
        <option>Ultrasound Room 4</option>
        <option>Ultrasound Room 5</option>
        <option>Ultrasound Room 6</option>
        <option>Ultrasound Room 7</option>
        <option>Collection Room 1</option>
        <option>Collection Room 2</option>
      </select>
    </div>

    <!-- STAFF -->
    <div class="card">
      <label>Staff</label>
      <select id="staff" required>
        <option value="">Select staff</option>
        <option>Hamse</option>
        <option>Hanna</option>
        <option>Mohubo</option>
        <option>Suweis</option>
        <option>Tania</option>
        <option>Ubah</option>
      </select>
    </div>

    <!-- SHIFT -->
    <div class="card">
      <label>Shift</label>
      <select id="shift" required>
        <option value="">Select shift</option>
        <option>Morning</option>
        <option>Afternoon</option>
        <option>Evening</option>
        <option>Night</option>
      </select>
    </div>

    <!-- TASKS -->
    <h3>Tasks Completed</h3>

    <div class="task-card">
      <label>Trash</label>
      <select class="task">
        <option>Y</option><option>N</option><option>NA</option>
      </select>
    </div>

    <div class="task-card">
      <label>Mop</label>
      <select class="task">
        <option>Y</option><option>N</option><option>NA</option>
      </select>
    </div>

    <div class="task-card">
      <label>Sanitize</label>
      <select class="task">
        <option>Y</option><option>N</option><option>NA</option>
      </select>
    </div>

    <div class="task-card">
      <label>Sweep</label>
      <select class="task">
        <option>Y</option><option>N</option><option>NA</option>
      </select>
    </div>

    <div class="task-card">
      <label>Linen Change</label>
      <select class="task">
        <option>Y</option><option>N</option><option>NA</option>
      </select>
    </div>

    <div class="task-card">
      <label>Vacuum</label>
      <select class="task">
        <option>Y</option><option>N</option><option>NA</option>
      </select>
    </div>

    <!-- NOTES -->
    <div class="card">
      <label>Notes</label>
      <textarea id="notes"></textarea>
    </div>

    <button type="submit" class="submit-btn">Submit Survey</button>

  </form>

  <div id="successScreen" class="success-screen" style="display:none;">
    <h2>Survey Submitted</h2>
    <p>Saved successfully.</p>
  </div>

</main>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="survey.js"></script>
</body>
</html>
