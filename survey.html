<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Cleaning Survey</title>

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="survey.css">
</head>

<body>

<header class="top-bar">
  <div>
    <h1>Daily Cleaning Survey</h1>
    <p>Complete once per room per shift</p>
  </div>

  <nav class="top-nav-links">
    <a href="index.html">Dashboard</a>
  </nav>
</header>

<main class="survey-container">

  <!-- PROGRESS BAR -->
  <div class="progress-container">
    <div id="progressBar" class="progress-bar"></div>
  </div>

  <form id="surveyForm">

    <!-- ROOM -->
    <div class="card">
      <label>Room</label>
      <select id="room" required>
        <option value="">Select room</option>
        <option>Andrology/Embryology Lab</option>
        <option>Blood Lab</option>
        <option>Recovery Room</option>
        <option>Procedure Room</option>
        <option>Ultrasound Room 1</option>
        <option>Ultrasound Room 2</option>
        <option>Ultrasound Room 3</option>
        <option>Ultrasound Room 4</option>
        <option>Ultrasound Room 5</option>
        <option>Ultrasound Room 6</option>
        <option>Ultrasound Room 7</option>
        <option>Collection Room 1</option>
        <option>Collection Room 2</option>
      </select>
    </div>

    <!-- STAFF -->
    <div class="card">
      <label>Staff</label>
      <select id="staff" required>
        <option value="">Select staff</option>

        <!-- Individual staff -->
        <option>Hamse</option>
        <option>Hanna</option>
        <option>Mohubo</option>
        <option>Suweis</option>
        <option>Tania</option>
        <option>Ubah</option>
        <option>David</option>

        <!-- GROUPS -->
        <option>Hanna, Hamse, Tania</option>
        <option>Hanna, Ubah, Tania</option>
        <option>Hanna, David, Tania</option>
      </select>
    </div>

    <!-- SHIFT -->
    <div class="card">
      <label>Shift</label>
      <select id="shift" required>
        <option value="">Select shift</option>
        <option>Morning</option>
        <option>Afternoon</option>
        <option>Evening</option>
        <option>Night</option>
      </select>
    </div>
    <label for="work_date">Cleaning Date</label>
<input type="date" id="work_date" />

    <!-- TASKS -->
    <h3 class="tasks-title">Tasks Completed</h3>
     <button type="button" id="yesToAllBtn" class="yes-all-btn">
        Yes to All
    </button>

    <button type="button" id="resetAllBtn" class="reset-all-btn">
        Reset All
    </button>
    <p class="tasks-subtitle">Y = Yes | N = No | NA = Not Applicable</p>

    <div class="task-card" data-task="trash">
      <label>
        <span class="icon">🗑️</span> Trash
      </label>
      <select class="task-select">
        <option value="">--</option>
        <option value="Y">Y</option>
        <option value="N">N</option>
        <option value="NA">NA</option>
      </select>
    </div>

    <div class="task-card" data-task="mop">
      <label>
        <span class="icon">🧹</span> Mop
      </label>
      <select class="task-select">
        <option value="">--</option>
        <option value="Y">Y</option>
        <option value="N">N</option>
        <option value="NA">NA</option>
      </select>
    </div>

    <div class="task-card" data-task="sanitize">
      <label>
        <span class="icon">🧴</span> Sanitize
      </label>
      <select class="task-select">
        <option value="">--</option>
        <option value="Y">Y</option>
        <option value="N">N</option>
        <option value="NA">NA</option>
      </select>
    </div>

    <div class="task-card" data-task="sweep">
      <label>
        <span class="icon">🧽</span> Sweep
      </label>
      <select class="task-select">
        <option value="">--</option>
        <option value="Y">Y</option>
        <option value="N">N</option>
        <option value="NA">NA</option>
      </select>
    </div>

    <div class="task-card" data-task="linen_change">
      <label>
        <span class="icon">🛏️</span> Linen Change
      </label>
      <select class="task-select">
        <option value="">--</option>
        <option value="Y">Y</option>
        <option value="N">N</option>
        <option value="NA">NA</option>
      </select>
    </div>

    <div class="task-card" data-task="vacuum">
      <label>
        <span class="icon">🌀</span> Vacuum
      </label>
      <select class="task-select">
        <option value="">--</option>
        <option value="Y">Y</option>
        <option value="N">N</option>
        <option value="NA">NA</option>
      </select>
    </div>

    <!-- NOTES -->
    <div class="card">
      <label>Notes</label>
      <textarea id="notes" placeholder="Optional notes..."></textarea>
    </div>

    <button type="submit" class="submit-btn">
      Submit Survey
    </button>

  </form>

  <!-- SUCCESS SCREEN -->
  <div id="successScreen" class="success-screen" style="display:none;">
    <h2>Survey Submitted</h2>
    <p>Saved successfully</p>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="survey.js"></script>

</body>
</html>
