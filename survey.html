<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Daily Cleaning Survey</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="survey.css" />
</head>

<body>

  <header class="top-bar">
    <div class="top-bar-left">
      <div>
        <h1>Daily Cleaning Survey</h1>
        <p>Complete once per room per shift</p>
      </div>

      <nav class="top-nav-links">
        <a href="index.html">Dashboard</a>
        <a href="reports.html">Reports</a>
      </nav>
    </div>
  </header>

  <main class="survey-container">

    <h1>Daily Cleaning Survey</h1>
    <p class="subtitle">Complete once per room per shift</p>

    <form id="surveyForm">

      <label for="room">Room</label>
      <select id="room" required>
        <option value="">Select room</option>
        <option>Andrology/Embryology Lab</option>
        <option>Blood Lab</option>
        <option>Recovery Room</option>
        <option>Procedure Room</option>
        <option>Ultrasound Room 1</option>
        <option>Ultrasound Room 2</option>
        <option>Ultrasound Room 3</option>
        <option>Ultrasound Room 4</option>
        <option>Ultrasound Room 5</option>
        <option>Ultrasound Room 6</option>
        <option>Ultrasound Room 7</option>
        <option>Collection Room 1</option>
        <option>Collection Room 2</option>
      </select>

      <label for="staff">Staff</label>
      <select id="staff" required>
        <option value="">Select staff</option>
        <option>Staff A</option>
        <option>Staff B</option>
        <option>Staff C</option>
      </select>

      <label for="shift">Shift</label>
      <select id="shift" required>
        <option value="">Select shift</option>
        <option>Morning</option>
        <option>Afternoon</option>
        <option>Evening</option>
        <option>Night</option>
      </select>

      <h3 class="tasks-title">Tasks Completed</h3>
      <p class="tasks-subtitle">Y = Completed &nbsp; N = Not Completed &nbsp; NA = Not Applicable</p>

      <div class="task-row">
        <label>
          <img src="icons/trash.svg" class="icon" />
          Trash
        </label>
        <select class="task-select">
          <option>Y</option>
          <option>N</option>
          <option>NA</option>
        </select>
      </div>

      <div class="task-row">
        <label>
          <img src="icons/mop.svg" class="icon" />
          Mop
        </label>
        <select class="task-select">
          <option>Y</option>
          <option>N</option>
          <option>NA</option>
        </select>
      </div>

      <label for="notes">Notes</label>
      <textarea id="notes" placeholder="Optional"></textarea>

      <button type="submit" class="btn primary">Submit Survey</button>

    </form>

    <div id="successScreen" style="display:none;">
      <h2>Survey Submitted</h2>
      <p>Your cleaning record has been saved.</p>
    </div>

  </main>

  <script src="survey.js"></script>

</body>
</html>
