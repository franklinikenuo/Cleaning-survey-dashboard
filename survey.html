<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Cleaning Survey</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    label {
      font-weight: bold;
      margin-top: 15px;
      display: block;
    }
    select, input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 15px;
      background: #0078ff;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Daily Cleaning Survey</h2>

    <form id="surveyForm">

      <!-- ROOM DROPDOWN -->
      <label for="room">Room</label>
      <select id="room" name="room" required>
        <option value="">Select room</option>
        <option>Andrology Lab</option>
        <option>Recovery Room</option>
        <option>Procedure Room</option>
        <option>Ultrasound Room 1</option>
        <option>Ultrasound Room 2</option>
        <option>Ultrasound Room 3</option>
        <option>Ultrasound Room 4</option>
        <option>Ultrasound Room 5</option>
        <option>Collection Room 1</option>
        <option>Collection Room 2</option>
        <option>Blood Lab</option>
      </select>

      <!-- STAFF DROPDOWN -->
      <label for="staff">Staff Name</label>
      <select id="staff" name="staff" required>
        <option value="">Select staff</option>
        <option>Hanna</option>
        <option>Tania</option>
        <option>Hamse</option>
        <option>Mohubo</option>
      </select>

      <hr style="margin: 25px 0;">

      <h3>Tasks Completed</h3>

      <!-- TASK DROPDOWNS -->
      <label>Trash</label>
      <select id="trash" name="trash" required>
        <option value="">Y / N / NA</option>
        <option>Y</option>
        <option>N</option>
        <option>NA</option>
      </select>

      <label>Mop</label>
      <select id="mop" name="mop" required>
        <option value="">Y / N / NA</option>
        <option>Y</option>
        <option>N</option>
        <option>NA</option>
      </select>

      <label>Sanitize</label>
      <select id="sanitize" name="sanitize" required>
        <option value="">Y / N / NA</option>
        <option>Y</option>
        <option>N</option>
        <option>NA</option>
      </select>

      <label>Sweep</label>
      <select id="sweep" name="sweep" required>
        <option value="">Y / N / NA</option>
        <option>Y</option>
        <option>N</option>
        <option>NA</option>
      </select>

      <label>Linen Change</label>
      <select id="linen" name="linen" required>
        <option value="">Y / N / NA</option>
        <option>Y</option>
        <option>N</option>
        <option>NA</option>
      </select>

      <label>Vacuum</label>
      <select id="vacuum" name="vacuum" required>
        <option value="">Y / N / NA</option>
        <option>Y</option>
        <option>N</option>
        <option>NA</option>
      </select>

      <button type="submit">Submit</button>
    </form>

    <p id="status" style="margin-top:20px; font-weight:bold;"></p>
  </div>

  <script>
    document.getElementById("surveyForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const data = {
        room: document.getElementById("room").value,
        staff: document.getElementById("staff").value,
        trash: document.getElementById("trash").value,
        mop: document.getElementById("mop").value,
        sanitize: document.getElementById("sanitize").value,
        sweep: document.getElementById("sweep").value,
        linen: document.getElementById("linen").value,
        vacuum: document.getElementById("vacuum").value
      };

      const response = await fetch("https://cleaning-survey-api.onrender.com/survey", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      document.getElementById("status").innerText =
        response.ok ? "Submitted successfully!" : "Submission failed.";
    });
  </script>
</body>
</html>
