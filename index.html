<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cleaning Survey Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- AdminLTE & dependencies -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.4/css/all.min.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- PDF Export Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <style>
    .content-wrapper { padding: 1rem; }
    .table-responsive { max-height: 70vh; overflow-y: auto; }
  </style>
</head>

<body class="hold-transition sidebar-mini">
<div class="wrapper">

  <!-- Navbar -->
  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <span class="navbar-brand mb-0 h5">Cleaning Survey Dashboard</span>
  </nav>

  <!-- Sidebar -->
  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <a href="#" class="brand-link">
      <span class="brand-text font-weight-light">Cleaning Logs</span>
    </a>
    <div class="sidebar">
      <nav class="mt-2">
        <ul class="nav nav-pills nav-sidebar flex-column">
          <li class="nav-item">
            <a href="#" class="nav-link active">
              <i class="nav-icon fas fa-table"></i>
              <p>Submissions</p>
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </aside>

  <!-- Content Wrapper -->
  <div class="content-wrapper">
    <section class="content">
      <div class="container-fluid">

        <!-- Filters -->
        <div class="row mb-3">
          <div class="col-md-3">
            <label>Room</label>
            <input id="filter-room" class="form-control" placeholder="e.g. Room 12">
          </div>

          <div class="col-md-3">
            <label>Staff</label>
            <input id="filter-staff" class="form-control" placeholder="e.g. John">
          </div>

          <div class="col-md-3">
            <label>Shift</label>
            <input id="filter-shift" class="form-control" placeholder="Morning/Evening/Night">
          </div>

          <div class="col-md-3 d-flex flex-column justify-content-end">

            <!-- Refresh -->
            <button id="btn-refresh" class="btn btn-primary btn-block mb-2">
              <i class="fas fa-sync-alt"></i> Refresh
            </button>

            <!-- CSV Export -->
            <button id="btn-export" class="btn btn-success btn-block mb-2">
              <i class="fas fa-file-csv"></i> Export CSV
            </button>

            <!-- PDF Export -->
            <button id="btn-pdf" class="btn btn-danger btn-block">
              <i class="fas fa-file-pdf"></i> Export PDF
            </button>

          </div>
        </div>

        <!-- SUMMARY CARDS -->
        <div class="row mb-4">

          <div class="col-md-4">
            <div class="small-box bg-info">
              <div class="inner">
                <h3>
                  <span id="todayCompliance">0%</span>
                  <span id="todayTrend" style="font-size:22px; margin-left:6px;"></span>
                </h3>
                <p>Today's Compliance
