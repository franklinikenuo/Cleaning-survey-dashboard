<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cleaning Survey Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- AdminLTE & dependencies (CDN) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.4/css/all.min.css">

  <!-- Optional: custom styles -->
  <style>
    .content-wrapper { padding: 1rem; }
    .table-responsive { max-height: 70vh; overflow-y: auto; }
  </style>
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

  <!-- Navbar -->
  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <span class="navbar-brand mb-0 h5">Cleaning Survey Dashboard</span>
  </nav>

  <!-- Sidebar (minimal) -->
  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <a href="#" class="brand-link">
      <span class="brand-text font-weight-light">Cleaning Logs</span>
    </a>
    <div class="sidebar">
      <nav class="mt-2">
        <ul class="nav nav-pills nav-sidebar flex-column">
          <li class="nav-item">
            <a href="#" class="nav-link active">
              <i class="nav-icon fas fa-table"></i>
              <p>Submissions</p>
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </aside>

  <!-- Content Wrapper -->
  <div class="content-wrapper">
    <section class="content">
      <div class="container-fluid">

        <!-- Filters -->
        <div class="row mb-3">
          <div class="col-md-3">
            <label>Room</label>
            <input id="filter-room" class="form-control" placeholder="e.g. Room 12">
          </div>
          <div class="col-md-3">
            <label>Staff</label>
            <input id="filter-staff" class="form-control" placeholder="e.g. John">
          </div>
          <div class="col-md-3">
            <label>Shift</label>
            <input id="filter-shift" class="form-control" placeholder="Morning/Evening/Night">
          </div>
          <div class="col-md-3 d-flex align-items-end">
            <button id="btn-refresh" class="btn btn-primary btn-block">
              <i class="fas fa-sync-alt"></i> Refresh
            </button>
          </div>
        </div>

        <!-- Table -->
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Survey Submissions</h3>
          </div>
          <div class="card-body table-responsive p-0">
            <table class="table table-hover text-nowrap" id="survey-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Date</th>
                  <th>Room</th>
                  <th>Staff</th>
                  <th>Shift</th>
                  <th>Tasks Completed</th>
                  <th>Notes</th>
                </tr>
              </thead>
              <tbody>
                <!-- Filled by JS -->
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </section>
  </div>

</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>

<script src="dashboard.js"></script>
</body>
</html>
