<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cleaning Compliance Dashboard</title>

  <link rel="stylesheet" href="styles.css" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Export tools -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<header class="top-bar">
  <div>
    <h1>Cleaning Compliance Dashboard</h1>
    <p>Hospital-Grade Cleaning Performance System</p>
  </div>

  <!-- NAV RESTORED -->
  <div class="action-bar">

    <!-- EXPORT UI V2 -->
    <div class="export-console">
      <button class="btn">Export ▼</button>

      <div class="export-menu">
        <button onclick="exportCSV()">CSV Report</button>
        <button onclick="exportExcel()">Excel Report</button>
        <button onclick="exportPDF()">PDF Dashboard</button>
      </div>
    </div>

    <a href="survey.html" class="btn">+ New Survey</a>
  </div>
</header>

<main class="main-layout">

  <!-- SUMMARY -->
  <section class="summary-grid">
    <div class="card">
      <h3>Total Submissions</h3>
      <p id="total-submissions">--</p>
    </div>

    <div class="card">
      <h3>Overall Compliance</h3>
      <p id="overall-compliance">--%</p>
    </div>
  </section>

  <!-- ===== QUICK INSIGHTS ===== -->
<section class="card">
  <h3>Quick Insights</h3>
  <div id="insightsPanel">
    Loading insights...
  </div>
</section>

  <!-- LEADERBOARD -->
  <section class="card">
    <h3>Staff Leaderboard</h3>
    <div id="staff-leaderboard">Loading...</div>
  </section>

  <!-- FILTERS -->
  <section class="card filters-card">
    <div class="filters-grid">

      <div>
        <label>Room</label>
        <select id="filter-room">
          <option value="all">All Rooms</option>
        </select>
      </div>

      <div>
        <label>Staff</label>
        <input id="filter-staff" placeholder="Search staff"/>
      </div>

      <div>
        <label>Shift</label>
        <select id="filter-shift">
          <option value="all">All Shifts</option>
          <option>Morning</option>
          <option>Afternoon</option>
          <option>Evening</option>
          <option>Night</option>
        </select>
      </div>

      <div>
        <label>Date</label>
        <input type="date" id="filter-date"/>
      </div>

    </div>
  </section>

  <!-- CHARTS -->
  <section class="charts-grid">
    <div class="card">
      <h3>Room Activity</h3>
      <canvas id="roomChart"></canvas>
    </div>

    <div class="card">
      <h3>Shift Distribution</h3>
      <canvas id="shiftChart"></canvas>
    </div>
  </section>

  <!-- TABLE -->
  <section class="card">
    <h3>Submission Records</h3>

    <table id="submissions-table">
      <thead>
        <tr>
          <th>Room</th>
          <th>Shift</th>
          <th>Staff</th>
          <th>Tasks</th>
          <th>Notes</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

</main>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- DASHBOARD LOGIC -->
<script src="dashboard.js"></script>

</body>
</html>
